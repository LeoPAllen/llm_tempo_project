{% extends "global/Page.html" %}
{% load otree static %}

{% block content %}
<div class="study-page">
{% if show_debug_treatment %}
<div class="debug-badge">Debug only: treatment = {{ debug_treatment }}</div>
{% endif %}
<div class="study-kicker">Next Section</div>
<h3 class="study-title">{{ task.title }}</h3>
<div class="study-panel">
<p>{{ task.intro_text }}</p>
</div>
<p>Click Next when you are ready to continue.</p>
{{ next_button }}
</div>
{% endblock %}
